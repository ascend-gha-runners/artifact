name: 'Upload to OBS'
description: 'Upload a file to Huawei Cloud OBS bucket and return the public URL'

inputs:
  access_key:
    description: 'Huawei Cloud Access Key (AK)'
    required: true
  secret_key:
    description: 'Huawei Cloud Secret Key (SK)'
    required: true
  file_path:
    description: 'Path to the file to upload'
    required: true
  file_name:
    description: 'Target file name in OBS (defaults to source file basename)'
    required: false
    default: ''

outputs:
  url:
    description: 'Public URL of the uploaded file'
    value: ${{ steps.upload.outputs.url }}
  object_key:
    description: 'Object key in OBS bucket'
    value: ${{ steps.upload.outputs.object_key }}

runs:
  using: 'composite'
  steps:
    - name: Download and setup obsutil
      shell: bash
      run: |
        {
          ARCH=$(uname -m)
          if [ "${ARCH}" = "aarch64" ] || [ "${ARCH}" = "arm64" ]; then
            OBSUTIL_ARCH="arm64"
          else
            OBSUTIL_ARCH="amd64"
          fi
          curl -sSL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${OBSUTIL_ARCH}.tar.gz" -o /tmp/obsutil.tar.gz
          tar -xzf /tmp/obsutil.tar.gz -C /tmp
          OBSUTIL_DIR=$(find /tmp -maxdepth 1 -name "obsutil_linux_${OBSUTIL_ARCH}_*" -type d | head -1)
          chmod +x "${OBSUTIL_DIR}/obsutil"
          echo "${OBSUTIL_DIR}" >> $GITHUB_PATH
        } > /dev/null 2>&1
        echo "obsutil setup complete (${OBSUTIL_ARCH})"

    - name: Configure obsutil
      shell: bash
      run: |
        obsutil config \
          -i=${{ inputs.access_key }} \
          -k=${{ inputs.secret_key }} \
          -e=obs.ap-southeast-1.myhuaweicloud.com > /dev/null 2>&1
        echo "OBS credentials configured"

    - name: Upload file to OBS
      id: upload
      shell: bash
      run: |
        BUCKET="ascend-ci-cache-hk"
        ENDPOINT="obs.ap-southeast-1.myhuaweicloud.com"
        PATH_PREFIX="github-actions"

        FILE_PATH="${{ inputs.file_path }}"
        FILE_NAME="${{ inputs.file_name }}"

        if [ ! -f "${FILE_PATH}" ]; then
          echo "::error::File not found: ${FILE_PATH}"
          exit 1
        fi

        if [ -z "${FILE_NAME}" ]; then
          FILE_NAME=$(basename "${FILE_PATH}")
        fi

        FILE_SIZE=$(stat -c%s "${FILE_PATH}" 2>/dev/null || stat -f%z "${FILE_PATH}" 2>/dev/null)
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        OBJECT_KEY="${PATH_PREFIX}/${TIMESTAMP}/${FILE_NAME}"

        echo "Uploading artifact: ${FILE_NAME}"
        echo "File size: ${FILE_SIZE} bytes"

        obsutil cp "${FILE_PATH}" "obs://${BUCKET}/${OBJECT_KEY}" > /dev/null 2>&1

        if [ $? -ne 0 ]; then
          echo "::error::Upload failed"
          exit 1
        fi

        URL="https://${BUCKET}.${ENDPOINT}/${OBJECT_KEY}"

        echo "url=${URL}" >> $GITHUB_OUTPUT
        echo "object_key=${OBJECT_KEY}" >> $GITHUB_OUTPUT

        echo "Artifact ${FILE_NAME} has been successfully uploaded!"
        echo "Artifact download URL: ${URL}"
