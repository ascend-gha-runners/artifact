name: 'Upload Artifact to OBS'
description: 'Upload artifact to Huawei Cloud OBS with metadata registry. Drop-in replacement for actions/upload-artifact.'

inputs:
  access_key:
    description: 'Huawei Cloud Access Key (AK)'
    required: true
  secret_key:
    description: 'Huawei Cloud Secret Key (SK)'
    required: true
  name:
    description: 'Artifact name (used to retrieve it later via download action)'
    required: true
  path:
    description: |
      File, directory, or glob patterns to upload. Supports multiline, e.g.:
        dist/
        *.json
        !dist/**/*.map
    required: true
  if-no-files-found:
    description: 'Behavior if no files are found at the path: warn, error, or ignore'
    required: false
    default: 'warn'
  retention-days:
    description: 'Number of days to retain the artifact (recorded in metadata only)'
    required: false
    default: '90'
  bucket:
    description: 'OBS bucket name'
    required: false
    default: 'ascend-ci-cache-hk'
  endpoint:
    description: 'OBS endpoint'
    required: false
    default: 'obs.ap-southeast-1.myhuaweicloud.com'

outputs:
  artifact-id:
    description: 'Artifact identifier (object prefix in OBS)'
    value: ${{ steps.upload.outputs.artifact_id }}
  artifact-url:
    description: 'Public URL prefix of the uploaded artifact'
    value: ${{ steps.upload.outputs.artifact_url }}

runs:
  using: 'composite'
  steps:
    - name: Setup obsutil
      shell: bash
      run: |
        if command -v obsutil &>/dev/null; then
          echo "obsutil already installed, skipping setup"
          exit 0
        fi
        {
          ARCH=$(uname -m)
          if [ "${ARCH}" = "aarch64" ] || [ "${ARCH}" = "arm64" ]; then
            OBSUTIL_ARCH="arm64"
          else
            OBSUTIL_ARCH="amd64"
          fi
          curl -sSL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${OBSUTIL_ARCH}.tar.gz" \
            -o /tmp/obsutil.tar.gz
          tar -xzf /tmp/obsutil.tar.gz -C /tmp
          OBSUTIL_DIR=$(find /tmp -maxdepth 1 -name "obsutil_linux_${OBSUTIL_ARCH}_*" -type d | head -1)
          chmod +x "${OBSUTIL_DIR}/obsutil"
          echo "${OBSUTIL_DIR}" >> $GITHUB_PATH
        } > /dev/null 2>&1
        echo "obsutil setup complete"

    - name: Configure obsutil
      shell: bash
      run: |
        obsutil config \
          -i=${{ inputs.access_key }} \
          -k=${{ inputs.secret_key }} \
          -e=${{ inputs.endpoint }} > /dev/null 2>&1
        echo "OBS credentials configured"

    - name: Upload artifact
      id: upload
      shell: bash
      run: |
        set -euo pipefail

        BUCKET="${{ inputs.bucket }}"
        ENDPOINT="${{ inputs.endpoint }}"
        NAME="${{ inputs.name }}"
        FILE_PATH="${{ inputs.path }}"
        REPO="${{ github.repository }}"
        RUN_ID="${{ github.run_id }}"

        # Deterministic path: artifacts/{repo}/{run_id}/{name}/
        OBJECT_PREFIX="artifacts/${REPO}/${RUN_ID}/${NAME}"
        META_KEY="artifacts/${REPO}/${RUN_ID}/_meta/${NAME}.json"

        # ── Expand multiline path input into include/exclude lists ──
        # Supports: single path, directory, glob, multiline, ! exclusions
        INCLUDE_PATTERNS=()
        EXCLUDE_PATTERNS=()
        while IFS= read -r line; do
          line="${line#"${line%%[![:space:]]*}"}"  # trim leading whitespace
          line="${line%"${line##*[![:space:]]}"}"  # trim trailing whitespace
          [ -z "${line}" ] && continue
          if [[ "${line}" == '!'* ]]; then
            EXCLUDE_PATTERNS+=("${line:1}")
          else
            INCLUDE_PATTERNS+=("${line}")
          fi
        done <<< "${FILE_PATH}"

        # Collect matching files using find + glob expansion
        STAGING_DIR=$(mktemp -d)
        FILE_COUNT=0

        for PATTERN in "${INCLUDE_PATTERNS[@]}"; do
          # Use bash glob expansion; fall back to literal path
          shopt -s globstar nullglob
          for MATCH in ${PATTERN}; do
            [ -e "${MATCH}" ] || continue
            if [ -d "${MATCH}" ]; then
              while IFS= read -r -d '' f; do
                REL="${f#./}"
                # Check against exclude patterns
                EXCLUDED=false
                for EXCL in "${EXCLUDE_PATTERNS[@]}"; do
                  case "${REL}" in
                    ${EXCL}) EXCLUDED=true; break ;;
                  esac
                done
                if [ "${EXCLUDED}" = "false" ]; then
                  TARGET="${STAGING_DIR}/${REL}"
                  mkdir -p "$(dirname "${TARGET}")"
                  cp "${f}" "${TARGET}"
                  FILE_COUNT=$((FILE_COUNT + 1))
                fi
              done < <(find "${MATCH}" -type f -print0)
            else
              REL="${MATCH#./}"
              EXCLUDED=false
              for EXCL in "${EXCLUDE_PATTERNS[@]}"; do
                case "${REL}" in
                  ${EXCL}) EXCLUDED=true; break ;;
                esac
              done
              if [ "${EXCLUDED}" = "false" ]; then
                TARGET="${STAGING_DIR}/${REL}"
                mkdir -p "$(dirname "${TARGET}")"
                cp "${MATCH}" "${TARGET}"
                FILE_COUNT=$((FILE_COUNT + 1))
              fi
            fi
          done
          shopt -u globstar nullglob
        done

        # ── Handle no files found ──
        if [ "${FILE_COUNT}" -eq 0 ]; then
          case "${{ inputs.if-no-files-found }}" in
            error)
              echo "::error::No files found for path: ${FILE_PATH}"
              exit 1
              ;;
            warn)
              echo "::warning::No files found for path: ${FILE_PATH}, skipping upload"
              exit 0
              ;;
            ignore)
              exit 0
              ;;
          esac
        fi

        # ── Upload staged files ──
        TOTAL_SIZE=$(du -sb "${STAGING_DIR}" | awk '{print $1}')
        echo "Uploading ${FILE_COUNT} file(s), total size: ${TOTAL_SIZE} bytes"

        # Upload each top-level entry individually to avoid staging dir name leaking into OBS path
        > /tmp/obsutil_upload.log
        for item in "${STAGING_DIR}"/*; do
          [ -e "${item}" ] || continue
          if ! obsutil cp "${item}" "obs://${BUCKET}/${OBJECT_PREFIX}/" -r -f >> /tmp/obsutil_upload.log 2>&1; then
            echo "::error::Upload failed. See log:"
            cat /tmp/obsutil_upload.log
            exit 1
          fi
        done

        rm -rf "${STAGING_DIR}"
        echo "Uploaded ${FILE_COUNT} file(s), total size: ${TOTAL_SIZE} bytes"

        # ── Write metadata ──
        CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        cat > /tmp/_artifact_meta.json <<METAEOF
        {
          "name": "${NAME}",
          "repository": "${REPO}",
          "run_id": "${RUN_ID}",
          "object_prefix": "${OBJECT_PREFIX}",
          "file_count": ${FILE_COUNT},
          "total_size": ${TOTAL_SIZE},
          "created_at": "${CREATED_AT}",
          "retention_days": ${{ inputs.retention-days }},
          "workflow": "${{ github.workflow }}",
          "job": "${{ github.job }}",
          "sha": "${{ github.sha }}"
        }
        METAEOF

        obsutil cp /tmp/_artifact_meta.json "obs://${BUCKET}/${META_KEY}" > /dev/null 2>&1
        if [ $? -ne 0 ]; then
          echo "::warning::Failed to upload metadata, artifact files were uploaded successfully"
        fi

        # ── Set outputs ──
        ARTIFACT_URL="https://${BUCKET}.${ENDPOINT}/${OBJECT_PREFIX}"
        echo "artifact_id=${OBJECT_PREFIX}" >> $GITHUB_OUTPUT
        echo "artifact_url=${ARTIFACT_URL}" >> $GITHUB_OUTPUT

        echo "Artifact '${NAME}' uploaded successfully"
        echo "  URL: ${ARTIFACT_URL}"
